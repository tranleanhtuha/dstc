<!DOCTYPE html>
<html lang="vi">
    
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Ký Làm Chủ Nhật</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border-color: #cbd5e1;
            --input-bg: #f8fafc;
        }

        body { 
            font-family: 'Inter', 'Noto Sans Lao', sans-serif; 
            background: var(--bg-gradient); 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
            box-sizing: border-box;
        }

        .form-container { 
            background: var(--white); 
            padding: 40px 35px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px -10px rgba(37, 99, 235, 0.15); 
            width: 100%; 
            max-width: 480px; 
            box-sizing: border-box;
            position: relative;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #eff6ff;
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 12px;
            padding: 6px;
            display: flex;
            gap: 4px;
        }

        .btn-lang {
            background: transparent;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            margin: 0;
            width: auto;
            box-shadow: none;
        }

        .btn-lang.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.2);
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .header-icon {
            font-size: 44px;
            margin-bottom: 12px;
            display: inline-block;
            background: #eff6ff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.05);
        }

        h2 { 
            color: var(--text-dark); 
            margin: 0; 
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
            line-height: 1.4;
        }

        .form-group { margin-bottom: 25px; }

        label { 
            display: flex; 
            align-items: center;
            margin-bottom: 10px; 
            font-weight: 600; 
            color: var(--text-dark);
            font-size: 14px;
        }
        
        label i { margin-right: 8px; font-style: normal; }

        /* CSS SELECT2 CŨ */
        .select2-container--default .select2-selection--single {
            height: auto !important;
            min-height: 52px !important;
            border: 1.5px solid var(--border-color) !important;
            border-radius: 12px !important;
            background-color: var(--input-bg);
            box-sizing: border-box !important;
            position: relative !important;
            display: flex !important; 
            align-items: center !important;
        }

        .select2-container--default .select2-selection--single:focus,
        .select2-container--open .select2-selection--single {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background-color: var(--white);
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered { 
            display: block !important; 
            width: 100% !important;
            padding-left: 16px !important;
            padding-right: 60px !important; 
            padding-top: 8px !important;
            padding-bottom: 8px !important;
            color: var(--text-dark) !important;
            box-sizing: border-box !important;
            white-space: normal !important; 
            word-wrap: break-word !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__placeholder {
            color: #94a3b8 !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__clear {
            position: absolute !important;
            right: 36px !important; 
            top: 50% !important;
            transform: translateY(-50%) !important;
            z-index: 10 !important;
            color: #94a3b8 !important;
            font-size: 22px !important;
            background: transparent !important; 
            margin: 0 !important;
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            position: absolute !important;
            right: 14px !important; 
            top: 50% !important;
            transform: translateY(-50%) !important;
            height: auto !important;
        }

        .employee-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            gap: 10px;
        }
        
        .employee-name {
            font-weight: 500;
            color: var(--text-dark);
            font-size: 15px;
            line-height: 1.4;
        }

        .employee-id-badge {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            background-color: #e2e8f0;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .employee-selected {
            display: flex !important;
            flex-wrap: wrap !important; 
            align-items: center !important;
            width: 100% !important;
            gap: 6px 12px; 
        }

        .employee-selected .name {
            font-weight: 600;
            font-size: 15px;
            color: var(--primary-color);
            text-align: left;
        }

        .employee-selected .id-text {
            background-color: #eff6ff !important;
            color: var(--primary-color) !important;
            border: 1px solid rgba(37, 99, 235, 0.2);
            padding: 3px 8px !important;
            border-radius: 6px !important;
            font-size: 12px !important;
            font-weight: 700 !important;
            white-space: nowrap !important;
        }

        input[type="date"] { 
            width: 100%; 
            height: 52px; 
            padding: 0 16px; 
            border: 1.5px solid var(--border-color); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
            background-color: var(--input-bg);
            cursor: pointer;
        }

        input[type="date"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background-color: var(--white);
        }

        .submit-btn { 
            width: 100%; 
            padding: 16px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            font-family: inherit;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .submit-btn:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:active { transform: translateY(0); }

        .submit-btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .hint { 
            font-size: 13px; 
            color: #475569; 
            margin-top: 12px; 
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px 14px;
            border-radius: 10px;
            line-height: 1.4;
        }
        
        .hint::before {
            content: "💡";
            margin-right: 10px;
            font-size: 18px;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .form-container {
                padding: 30px 20px;
                border-radius: 20px;
            }
            
            h2 { font-size: 20px; }
            
            .header-icon {
                font-size: 36px;
                padding: 12px;
            }

            .lang-switch {
                top: 15px;
                right: 15px;
            }

            .select2-container--default .select2-selection--single .select2-selection__rendered {
                font-size: 14px;
            }

            .employee-selected .name { font-size: 14px; }
            .employee-selected .id-text { font-size: 11px; }
            
            .hint { font-size: 12px; }
            .submit-btn { font-size: 15px; padding: 14px; }
        }
    </style>
</head>

            "alert_success": "✅ ບັນທຶກສຳເລັດສຳລັບ:\n",
            "alert_error": "❌ ເກີດຂໍ້ຜິດພາດ! ບໍ່ສາມາດເຊື່ອມຕໍ່ຂໍ້ມູນໄດ້. ກະລຸນາລອງໃໝ່ອີກຄັ້ງ.",
            "confirm_msg": "ທ່ານແນ່ໃຈບໍ່ວ່າຕ້ອງການລົງທະບຽນໃຫ້ພະນັກງານ:\n{name} - ລະຫັດ: {id}\nໃນວັນທີ: {date}?",
            "already_registered": "✅ ພະນັກງານ {name} (ລະຫັດ: {id}) ໄດ້ລົງທະບຽນສຳເລັດສຳລັບວັນທີ {date} ແລ້ວ. ກະລຸນາຢ່າສົ່ງຊ້ຳ!"
        }
    };

    let currentLang = "vi"; 

    $(document).ready(function() {
        
        function initSelect2() {
            if ($('#employeeSelect').hasClass("select2-hidden-accessible")) {
                $('#employeeSelect').select2('destroy');
            }

            $('#employeeSelect').select2({
                allowClear: true,
                placeholder: translations[currentLang].search_placeholder,
                templateResult: formatEmployeeOption,    
                templateSelection: formatEmployeeSelection 
            });
        }

        function formatEmployeeOption (employee) {
            if (!employee.id) { return employee.text; }
            var parts = employee.text.split(' - MSNV: ');
            var name = parts[0];
            var id = parts.length > 1 ? parts[1] : employee.id;
            return $(
                '<div class="employee-option">' +
                    '<span class="employee-name">' + name + '</span>' +
                    '<span class="employee-id-badge">MSNV: ' + id + '</span>' +
                '</div>'
            );
        }

        function formatEmployeeSelection (employee) {
            if (!employee.id) { return employee.text; }
            var parts = employee.text.split(' - MSNV: ');
            var name = parts[0];
            var id = parts.length > 1 ? parts[1] : employee.id;
            return $(
                '<span class="employee-selected">' +
                    '<span class="name">' + name + '</span>' +
                    '<span class="id-text">MSNV: ' + id + '</span>' +
                '</span>'
            );
        }

        initSelect2();

        // XỬ LÝ ĐỔI NGÔN NGỮ
        $('.btn-lang').on('click', function() {
            $('.btn-lang').removeClass('active');
            $(this).addClass('active');
            
            currentLang = $(this).data('lang');
            
            $('[data-i18n]').each(function() {
                const key = $(this).data('i18n');
                $(this).text(translations[currentLang][key]);
            });

            initSelect2();
        });

        // XỬ LÝ NGÀY CHỦ NHẬT
        function getNextSunday() {
            const today = new Date();
            const dayOfWeek = today.getDay(); 
            const diff = (dayOfWeek === 0) ? 0 : (7 - dayOfWeek);
            const nextSunday = new Date(today);
            nextSunday.setDate(today.getDate() + diff);
            return nextSunday.toISOString().split('T')[0];
        }

        $('#regDate').val(getNextSunday());

        // XỬ LÝ LƯU TRÚ (LOCAL STORAGE) NGĂN CHẶN SUBMIT LẠI
        function checkAlreadyRegistered(employeeID, regDate) {
            const key = `registered_sunday_${employeeID}_${regDate}`;
            return localStorage.getItem(key) === "true";
        }

        function setRegistered(employeeID, regDate) {
            const key = `registered_sunday_${employeeID}_${regDate}`;
            localStorage.setItem(key, "true");
        }

        // XỬ LÝ SUBMIT FORM
        $('#registrationForm').on('submit', function(e) {
            e.preventDefault();
            
            const selectedText = $('#employeeSelect').find('option:selected').text();
            if(!$('#employeeSelect').val()) {
                alert(translations[currentLang].alert_empty);
                return;
            }

            const fullName = selectedText.split(' - ')[0];
            const employeeID = $('#employeeSelect').val();
            const regDate = $('#regDate').val();
            const submitBtn = $('#submitBtn');

            // 1. Kiểm tra xem người này đã đăng ký cho ngày này chưa
            if (checkAlreadyRegistered(employeeID, regDate)) {
                let msg = translations[currentLang].already_registered
                            .replace("{name}", fullName)
                            .replace("{id}", employeeID)
                            .replace("{date}", regDate);
                alert(msg);
                return; // Ngừng thực thi, không cho gửi
            }

            // 2. Hiện hộp thoại Xác nhận Tên và MSNV
            let confirmMsg = translations[currentLang].confirm_msg
                            .replace("{name}", fullName)
                            .replace("{id}", employeeID)
                            .replace("{date}", regDate);
            
            if (!confirm(confirmMsg)) {
                return; // Nếu bấm Cancel thì huỷ gửi
            }

            const scriptURL = 'https://script.google.com/macros/s/AKfycbyOy7-X8NpOlhkYpJnI8xEmH90Y_Omhv9hvz2Pg_o4irUA1-g5204_g3uaKiykM8b2y/exec';

            submitBtn.prop('disabled', true).text(translations[currentLang].alert_loading);

            $.ajax({
                url: scriptURL,
                method: 'POST',
                data: { "fullName": fullName, "employeeID": employeeID, "regDate": regDate },
                success: function(response) {
                    // Lưu cờ vào bộ nhớ trình duyệt để không cho gửi lại
                    setRegistered(employeeID, regDate);

                    alert(translations[currentLang].alert_success + fullName + ' (MSNV: ' + employeeID + ')');
                    $('#registrationForm')[0].reset();
                    $('#employeeSelect').val(null).trigger('change');
                    $('#regDate').val(getNextSunday());
                    submitBtn.prop('disabled', false).text(translations[currentLang].submit_btn);
                },
                error: function() {
                    alert(translations[currentLang].alert_error);
                    submitBtn.prop('disabled', false).text(translations[currentLang].submit_btn);
                }
            });
        });
    });
</script>

</body>
</html>
